<!DOCTYPE html>
<html>
  <head>
    <style>
      body { background: #222; color: #fff; margin: 0; }
      #canvas { width: 100vw; height: 80vh; display: block; background: black; }
      #output { height: 20vh; overflow-y: auto; padding: 10px; font-family: monospace; }
    </style>
  </head>
  <body>
    <!-- 1. The Canvas for the 3D game -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    
    <!-- 2. The Output area for console logs -->
    <p id="output"></p>

    <script>
      var Module = {
        print: (function() {
          var element = document.getElementById('output');
          return function(text) {
            element.innerHTML += text + "<br>";
            element.scrollTop = element.scrollHeight; // Auto-scroll
          };
        })(),
        printErr: function(text) {
          console.error(text);
        },        
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          return canvas;
        })()
      };
    </script>
    <script async src="Mlib/EURelWithDebInfo/Bin/RenderSceneFileActivity.js"></script>
  </body>
</html>
