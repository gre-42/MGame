<!DOCTYPE html>
<html>
  <head>
    <style>
      /* Ensure the body fills the entire viewport */
      html, body { 
        height: 100%; 
        margin: 0; 
        overflow: hidden; /* Prevents scrollbars from canvas rounding issues */
      }
      body { background: #222; color: #fff; }
      #canvas { display: block; background: black; }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
      var Module = {
        print: (function(text) {
          console.log(text);
        })(),
        printErr: function(text) {
          console.error(text);
        },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          return canvas;
        })()
      };
      Module.canvas.width = document.body.clientWidth;
      Module.canvas.height = document.body.clientHeight;
    </script>
    <script async src="assets.js"></script> 
    <script async src="Mlib/EURelease/Bin/RenderSceneFileActivity.js"></script>
  </body>
</html>
