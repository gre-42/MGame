<!DOCTYPE html>
<html>
  <head>
    <style>
      /* Ensure the body fills the entire viewport */
      html, body { 
        height: 100%; 
        margin: 0; 
        overflow: hidden; /* Prevents scrollbars from canvas rounding issues */
      }
      body { background: #222; color: #fff; }
      #canvas { display: block; background: black; }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
      var Module = {
        print: text => {
          console.log(text);
        },
        printErr: text => {
          console.error(text);
        },
        canvas: document.getElementById('canvas'),
        arguments: ["/;/data", "/levels/main/main.scn.json"]
      };
      Module.canvas.width = document.body.clientWidth;
      Module.canvas.height = document.body.clientHeight;
      const params = new URLSearchParams(window.location.search);
      params.forEach((value, key) => {
        // Treat as a switch if value is empty or "true"
        if (value === "" || value === "true" || value === "1") {
            Module.arguments.push("--" + key);
        } else {
            // Otherwise, treat as a named value pair
            Module.arguments.push("--" + key);
            Module.arguments.push(value);
        }
      });
    </script>
    <script async src="assets.js"></script> 
    <script async src="Mlib/EURelease/Bin/RenderSceneFileActivity.js"></script>
  </body>
</html>
