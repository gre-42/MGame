<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #222;
        color: #fff;
      }
      #canvas {
        width: 100vw;
        height: 100dvh;
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
      var Module = {
        print: text => {
          console.log(text);
        },
        printErr: text => {
          console.error(text);
        },
        canvas: document.getElementById('canvas'),
        arguments: ["/;/data", "/levels/main/main.scn.json"],
        websocket: {
            url: 'ws://ws',
            subprotocol: 'binary'
        }
      };
      Module.canvas.width = document.body.clientWidth;
      Module.canvas.height = document.body.clientHeight;
      const params = new URLSearchParams(window.location.search);
      params.forEach((value, key) => {
        // Treat as a switch if value is empty or "true"
        if (value === "" || value === "true" || value === "1") {
            Module.arguments.push("--" + key);
        } else {
            // Otherwise, treat as a named value pair
            Module.arguments.push("--" + key);
            Module.arguments.push(value);
        }
      });
    </script>
    <script async src="assets.js"></script>
    <script async src="../game/RenderSceneFileActivity.js"></script>
  </body>
</html>
