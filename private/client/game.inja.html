<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #222;
        color: #fff;
      }
      #canvas {
        width: 100vw;
        height: 100dvh;
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script type="module">
      import createModule from '../game/RenderSceneFileActivity.js?remote_secret={{remote_secret}}';
      import assetLoaderFactory from './assets_compressed.js?remote_secret={{remote_secret}}';
      const config = {
        preRun: (Module) => {
          assetLoaderFactory(Module);
        },
        print: text => {
          console.log(text);
        },
        printErr: text => {
          console.error(text);
        },
        canvas: document.getElementById('canvas'),
        arguments: [
          "compression/data;compression/dest/compressed;compression/dest/compressed.extended",
          "compression/dest/compressed/levels/main/main.scn.json",
          "--mesh", "obj.gz",
          "--animated_mesh", "mhx2.gz",
          "--audio", "mp3",
          "--compressed"],
        websocket: {
          url: 'ws://ws',
          subprotocol: 'binary'
        },
        locateFile: function (path, prefix) {
          const originalUrl = prefix + path;
          const url = new URL(originalUrl, window.location.href);
          url.searchParams.append('remote_secret', '{{remote_secret}}');
          return url.toString();
        }
      };
      config.canvas.width = document.body.clientWidth;
      config.canvas.height = document.body.clientHeight;
      const params = new URLSearchParams(window.location.search);
      params.forEach((value, key) => {
        if (value === "" || value === "true" || value === "1") {
            config.arguments.push("--" + key);
        } else {
            config.arguments.push("--" + key);
            config.arguments.push(value);
        }
      });
      createModule(config).then((Module) => {
        console.log("WASM Module successfully initialized!");
      });
    </script>
  </body>
</html>
