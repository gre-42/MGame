  game:
    build:
      context: .
      dockerfile: Dockerfile.dedicated
    ports:
      - "8042:8042/udp"
      - "8082:8082/tcp"
    command: [
      "Build/render_scene_file",
      "data",
      "data/levels/main/main.scn.json",
      "--app_reldir", ".vanilla_rally",
      "--print_render_residual_time",
      "--remote_site_id", "42",
      "--remote_role", "server",
      "--udp_ip", "0.0.0.0",
      "--udp_port", "8042",
      "--http_ip", "0.0.0.0",
      "--http_port", "8082",
      "--flavor", "extended"
    ]
    environment:
      LD_LIBRARY_PATH: Build
    volumes:
      - ./data:/app/data:ro
      - ./static/server:/app/static/server:ro
      - ./static/client:/app/static/client:ro
      - ./Mlib/EURelease/Bin:/app/static/game:ro
