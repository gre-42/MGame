services:
  game:
    build:
      context: .
      dockerfile: Dockerfile.dedicated
    ports:
      - "8042:8042/udp"
      - "8082:8082/tcp"
    command: [
      "Build/render_scene_file",
      "data",
      "data/levels/main/main.scn.json",
      "--app_reldir", ".vanilla_rally",
      "--print_render_residual_time",
      "--remote_site_id", "42",
      "--udp_ip", "0.0.0.0",
      "--udp_port", "8042",
      "--http_ip", "0.0.0.0",
      "--http_port", "8082",
      "--flavor", "extended"
    ]
    environment:
      LD_LIBRARY_PATH: Build
    volumes:
      - ./data:/app/data:ro
      - ./private:/app/private:ro
      - ./public/server:/app/public/server:ro
      - ./public/client:/app/public/client:ro
      - ./Mlib/E32URelease/Bin:/app/public/game:ro
    networks:
      - game-net

  wt-udp-proxy:
    build:
      context: Mlib/Web_Transport_Udp
    ports:
      - "8443:443/udp" # WebTransport/HTTP/3 requires UDP
      - "8443:443/tcp" # TCP required for initial HTTP handshake
    environment:
      TARGET_UDP_HOST: "game"
      TARGET_UDP_PORT: "8042"
      WT_VERBOSE: "0"
    volumes:
      - ./certs:/etc/ssl/certs
    networks:
      - game-net

  nginx-proxy:
    image: docker.io/library/nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8080:80/tcp"
      - "8444:443/tcp"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

networks:
  game-net:
    driver: bridge
